name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: echo "image=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Extract metadata (tags, labels)
        id: meta_primary
        continue-on-error: true
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          github-token: ${{ github.token }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Extract metadata (retry)
        id: meta_retry
        if: steps.meta_primary.outcome == 'failure'
        continue-on-error: true
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          github-token: ${{ github.token }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Resolve metadata outputs
        id: meta
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ steps.prep.outputs.image }}
          PRIMARY_TAGS: ${{ steps.meta_primary.outputs.tags }}
          PRIMARY_LABELS: ${{ steps.meta_primary.outputs.labels }}
          RETRY_TAGS: ${{ steps.meta_retry.outputs.tags }}
          RETRY_LABELS: ${{ steps.meta_retry.outputs.labels }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ -n "$PRIMARY_TAGS" ]; then
            {
              echo "tags<<EOF"
              echo "$PRIMARY_TAGS"
              echo "EOF"
              echo "labels<<EOF"
              echo "$PRIMARY_LABELS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$RETRY_TAGS" ]; then
            {
              echo "tags<<EOF"
              echo "$RETRY_TAGS"
              echo "EOF"
              echo "labels<<EOF"
              echo "$RETRY_LABELS"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          short_sha="${SHA:0:7}"
          tags="$IMAGE:sha-$short_sha"

          if [ "$REF_TYPE" = "branch" ]; then
            tags="$tags\n$IMAGE:$REF_NAME"
            if [ "$REF_NAME" = "main" ]; then
              tags="$tags\n$IMAGE:latest"
            fi
          fi

          if [ "$REF_TYPE" = "tag" ] && [[ "$REF_NAME" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
            tags="$tags\n$IMAGE:$major.$minor.$patch\n$IMAGE:$major.$minor\n$IMAGE:$major"
          fi

          labels="org.opencontainers.image.source=$SERVER_URL/$REPOSITORY\norg.opencontainers.image.revision=$SHA\norg.opencontainers.image.url=$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"

          {
            echo "tags<<EOF"
            echo -e "$tags"
            echo "EOF"
            echo "labels<<EOF"
            echo -e "$labels"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
